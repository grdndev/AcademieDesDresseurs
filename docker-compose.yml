services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.docker
    depends_on:
      - api

  api:
    build: ./backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: academie
      POSTGRES_PASSWORD: academie
      POSTGRES_DB: academie_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academie -d academie_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
