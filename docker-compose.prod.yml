version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app_net

  api:
    build: ./backend
    image: ${API_IMAGE:-academiedesdresseurs/api}:${APP_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 5001
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/express_api_db}
      JWT_SECRET: ${JWT_SECRET}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      CORS_ORIGINS: ${CORS_ORIGINS}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
    expose:
      - "5001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app_net

  frontend:
    build: ./frontend
    image: ${FRONTEND_IMAGE:-academiedesdresseurs/frontend}:${APP_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_LOCAL_API_URL: ${NEXT_LOCAL_API_URL:-http://api:5001/api}
    expose:
      - "3000"
    networks:
      - app_net

volumes:
  mongo_data:

networks:
  app_net:
    driver: bridge
