version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.http.conf:/etc/nginx/conf.d/default.conf:ro
      # Optional TLS cert mounts (when you switch to default.https.conf)
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app_net

networks:
  app_net:
    external: false
